name: Telebit Ubuntu 24.4 Spice 

on: 
  workflow_dispatch:
    
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Chuẩn bị
        run: |
          sudo apt update -y
          sudo apt install curl openssh-server
          - name: Cài SSHX
        run: |
          curl -sSf https://sshx.io/get | sh
           - name: Kết nối
        run: |
          sshx
          
          
